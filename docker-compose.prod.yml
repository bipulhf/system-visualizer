services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: visualizer
      POSTGRES_USER: visualizer
      POSTGRES_PASSWORD: visualizer
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visualizer -d visualizer"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7.4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  rabbitmq:
    image: rabbitmq:4.1-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: visualizer
      RABBITMQ_DEFAULT_PASS: visualizer
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 8

  kafka:
    image: apache/kafka:3.9.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      SERVER_PORT: 3001
      POSTGRES_URL: postgresql://visualizer:visualizer@postgres:5432/visualizer
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://visualizer:visualizer@rabbitmq:5672
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    expose:
      - "3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "fetch(''http://localhost:3001/health'').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 15s
      timeout: 8s
      retries: 8

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_SIMULATION_WS_URL: /ws/simulation
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      server:
        condition: service_healthy
    expose:
      - "3000"

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-}
    depends_on:
      web:
        condition: service_started
      server:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
